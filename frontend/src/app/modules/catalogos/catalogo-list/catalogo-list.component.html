<div class="container-fluid">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Catálogos</h2>
    <button class="btn btn-primary" routerLink="/catalogos/new">
      <i class="bi bi-plus-circle"></i> Nuevo Catálogo
    </button>
  </div>

  <!-- Loading State -->
  <div *ngIf="loading" class="text-center py-4">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Cargando...</span>
    </div>
    <p class="mt-2">Cargando catálogos...</p>
  </div>

  <!-- Error State -->
  <div *ngIf="error" class="alert alert-danger">
    <i class="bi bi-exclamation-triangle"></i> {{ error }}
  </div>

  <!-- Catálogos List con PrimeNG Table -->
  <div *ngIf="!loading && !error">
    <p-table #dt [value]="filteredCatalogos" [paginator]="true" [rows]="10"
             [globalFilterFields]="['codigo','nombre','descripcion']"
             [tableStyle]="{'min-width': '80rem'}"
             styleClass="p-datatable-sm p-datatable-gridlines"
             [loading]="loading"
             responsiveLayout="scroll">

      <!-- Header con buscador global -->
      <ng-template pTemplate="caption">
        <div class="d-flex justify-content-between align-items-center">
          <span class="p-input-icon-left">
            <i class="pi pi-search"></i>
            <input pInputText type="text" (input)="onGlobalFilter($event)"
                   placeholder="Buscar catálogo..." class="w-100"/>
          </span>
        </div>
      </ng-template>

      <!-- Columnas -->
      <ng-template pTemplate="header">
        <tr>
          <th pSortableColumn="id_catalogo">ID <p-sortIcon field="id_catalogo"></p-sortIcon></th>
          <th pSortableColumn="codigo">Código <p-sortIcon field="codigo"></p-sortIcon></th>
          <th pSortableColumn="nombre">Nombre <p-sortIcon field="nombre"></p-sortIcon></th>
          <th pSortableColumn="descripcion">Descripción <p-sortIcon field="descripcion"></p-sortIcon></th>
          <th>Estado</th>
          <th>Valores</th>
          <th>Acciones</th>
        </tr>
        <tr>
          <th></th>
          <th><input pInputText type="text" (input)="dt.filter($any($event.target).value, 'codigo', 'contains')" class="w-100" placeholder="Filtrar código"/></th>
          <th><input pInputText type="text" (input)="dt.filter($any($event.target).value, 'nombre', 'contains')" class="w-100" placeholder="Filtrar nombre"/></th>
          <th><input pInputText type="text" (input)="dt.filter($any($event.target).value, 'descripcion', 'contains')" class="w-100" placeholder="Filtrar descripción"/></th>
          <th>
            <select (change)="onActivoFilterChange($any($event.target).value)" class="form-select form-select-sm">
              <option value="">Todos</option>
              <option value="1">Activo</option>
              <option value="0">Inactivo</option>
            </select>
          </th>
          <th></th>
          <th></th>
        </tr>
      </ng-template>

      <!-- Filas de datos -->
      <ng-template pTemplate="body" let-catalogo>
        <tr>
          <td>{{ catalogo.id_catalogo }}</td>
          <td><code>{{ catalogo.codigo }}</code></td>
          <td><strong>{{ catalogo.nombre }}</strong></td>
          <td>{{ catalogo.descripcion || '-' }}</td>
          <td>
            <p-tag [value]="catalogo.activo === 1 ? 'Activo' : 'Inactivo'"
                   [severity]="catalogo.activo === 1 ? 'success' : 'danger'"></p-tag>
          </td>
          <td>
            <span class="badge bg-info">
              {{ catalogo.valores?.length || 0 }} valores
            </span>
          </td>
          <td>
            <div class="btn-group" role="group">
              <button class="btn btn-sm btn-outline-primary"
                      routerLink="/catalogos/{{ catalogo.id_catalogo }}/edit"
                      title="Editar">
                <i class="bi bi-pencil"></i>
              </button>
              <button class="btn btn-sm btn-outline-info"
                      routerLink="/catalogos/{{ catalogo.id_catalogo }}/valores"
                      title="Ver Valores">
                <i class="bi bi-list-ul"></i>
              </button>
              <button class="btn btn-sm btn-outline-danger"
                      (click)="deleteCatalogo(catalogo.id_catalogo)"
                      title="Desactivar">
                <i class="bi bi-trash"></i>
              </button>
            </div>
          </td>
        </tr>
      </ng-template>

      <!-- Mensaje cuando no hay datos -->
      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="7" class="text-center py-4">
            <i class="bi bi-inbox" style="font-size: 2rem; color: #6c757d;"></i>
            <p class="mt-2">No se encontraron catálogos</p>
          </td>
        </tr>
      </ng-template>

    </p-table>
  </div>
</div>
