<div class="container-fluid">
  <p-toast></p-toast>

  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Reporte de Proyección de Interés Anual</h2>
    <button class="btn btn-outline-primary" (click)="loadDatos()">
      <i class="bi bi-arrow-clockwise"></i> Actualizar
    </button>
  </div>

  <p-progressSpinner *ngIf="loading" [style]="{'width': '50px', 'height': '50px'}" strokeWidth="4"></p-progressSpinner>

  <div class="p-card" *ngIf="!loading">
    <p class="text-muted mb-4">
      Visualización histórica de los intereses generados por las inversiones a lo largo de los años.
    </p>

    <div class="chart-container">
      <canvas #chartCanvas></canvas>
    </div>
  </div>
</div>
