<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <h2>SIPRO - Sistema de Inversiones</h2>
      <p>Iniciar Sesión</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
      <div class="form-group">
        <label for="nombre_usuario">Usuario:</label>
        <input
          id="nombre_usuario"
          type="text"
          formControlName="nombre_usuario"
          class="form-control"
          [class.is-invalid]="f['nombre_usuario'].invalid && f['nombre_usuario'].touched"
          placeholder="Ingrese su usuario"
        />
        <div
          *ngIf="f['nombre_usuario'].invalid && f['nombre_usuario'].touched"
          class="invalid-feedback"
        >
          <span *ngIf="f['nombre_usuario'].errors?.['required']">
            El usuario es requerido
          </span>
        </div>
      </div>

      <div class="form-group">
        <label for="clave">Contraseña:</label>
        <input
          id="clave"
          type="password"
          formControlName="clave"
          class="form-control"
          [class.is-invalid]="f['clave'].invalid && f['clave'].touched"
          placeholder="Ingrese su contraseña"
        />
        <div
          *ngIf="f['clave'].invalid && f['clave'].touched"
          class="invalid-feedback"
        >
          <span *ngIf="f['clave'].errors?.['required']">
            La contraseña es requerida
          </span>
        </div>
      </div>

      <div *ngIf="errorMessage" class="alert alert-danger">
        {{ errorMessage }}
      </div>

      <button
        type="submit"
        class="btn btn-primary btn-block"
        [disabled]="loginForm.invalid || isLoading"
      >
        <span *ngIf="!isLoading">Ingresar</span>
        <span *ngIf="isLoading">
          <span class="spinner"></span>
          Ingresando...
        </span>
      </button>
    </form>
  </div>
</div>
