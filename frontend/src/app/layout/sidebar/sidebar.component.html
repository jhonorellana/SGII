<nav class="sidebar" [class.collapsed]="isCollapsed">
  <!-- Header -->
  <div class="sidebar-header">
    <div class="logo" [routerLink]="'/dashboard'" [class.active]="isActive('/dashboard')" title="Dashboard">
      <i class="bi bi-graph-up-arrow"></i>
      <span class="logo-text" *ngIf="!isCollapsed">SGII</span>
    </div>
    <button class="toggle-btn" (click)="toggleSidebar()">
      <i class="bi" [class.bi-chevron-left]="!isCollapsed" [class.bi-chevron-right]="isCollapsed"></i>
    </button>
  </div>

  <!-- Menu -->
  <ul class="sidebar-menu">
    <li class="menu-item" *ngFor="let item of menuItems">
      <!-- Single Item -->
      <a *ngIf="!item.children"
         class="menu-link"
         [routerLink]="item.path"
         [class.active]="isActive(item.path)"
         [attr.title]="isCollapsed ? item.title : ''"
         (click)="handleMenuClick(item, $event)">
        <i class="bi {{ item.icon }}"></i>
        <span class="menu-text">{{ item.title }}</span>
      </a>

      <!-- Parent Item with Children -->
      <div *ngIf="item.children" class="menu-parent">
        <a class="menu-link"
           [class.active]="isExpanded(item)"
           (click)="handleMenuClick(item, $event)"
           [attr.title]="isCollapsed ? item.title : ''">
          <i class="bi {{ item.icon }}"></i>
          <span class="menu-text">{{ item.title }}</span>
          <i class="bi bi-chevron-down menu-arrow"
             [class.rotated]="isExpanded(item)"></i>
        </a>
        <ul class="submenu" [class.expanded]="isExpanded(item)">
          <li class="submenu-item" *ngFor="let child of item.children">
            <a class="submenu-link"
               [routerLink]="child.path"
               [class.active]="isActive(child.path)"
               [attr.title]="isCollapsed ? child.title : ''">
              <i class="bi {{ child.icon }}"></i>
              <span class="menu-text">{{ child.title }}</span>
            </a>
          </li>
        </ul>
      </div>
    </li>
  </ul>
</nav>
